<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eight — we make software</title>
    <meta name="description" content="Eight is a small software studio in Bristol. Est. 2012. We make software.">
    <meta name="theme-color" content="#08080A">

    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- TASA Orbiter — display face for the tagline only -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=TASA+Orbiter:wght@400..800&display=swap" rel="stylesheet">

    <style>
        /* ── Reset ── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #08080A;
            --fg: #EAEAEA;
            --fg-muted: #6E6E76;
            --fg-subtle: #3a3a3a;
            --mono: ui-monospace, 'SF Mono', 'Cascadia Mono', Menlo, Consolas, monospace;
        }

        html, body { height: 100%; }

        body {
            background: var(--bg);
            color: var(--fg);
            font-family: var(--mono);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* The visitor's cursor IS the eighth dot — hide the native one
           on precise pointers only. UI overlays restore it. */
        @media (pointer: fine) {
            body { cursor: none; }
            .consent, .consent * { cursor: auto; }
            .consent button { cursor: pointer; }
        }

        #stage {
            position: fixed;
            inset: 0;
            display: block;
            touch-action: none;
        }

        #stage:focus { outline: none; }
        #stage:focus-visible {
            outline: 1px dashed rgba(234, 234, 234, 0.35);
            outline-offset: -10px;
        }

        /* ── Stats line ── */
        .stats {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 26px;
            text-align: center;
            font-size: 11px;
            letter-spacing: 0.18em;
            color: var(--fg-muted);
            opacity: 0;
            transition: opacity 0.9s ease;
            pointer-events: none;
            user-select: none;
        }
        .stats.visible { opacity: 1; }

        /* ── No-JS fallback ── */
        .noscript {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 28px;
            background: var(--bg);
        }
        .noscript svg { width: 64px; height: 64px; }
        .noscript p { font-size: 14px; letter-spacing: 0.08em; }

        /* ── Cookie consent ── */
        .consent {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 200;
            max-width: 340px;
            opacity: 0;
            transform: translateY(12px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .consent.visible { opacity: 1; transform: translateY(0); }
        .consent.hiding { opacity: 0; transform: translateY(8px); }

        .consent-inner {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 20px;
            background: rgba(15, 15, 17, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--fg-subtle);
        }
        .consent-text { font-size: 13px; color: var(--fg-muted); line-height: 1.5; }
        .consent-text strong { color: var(--fg); font-weight: 500; }
        .consent-actions { display: flex; gap: 10px; }
        .consent-btn {
            font-family: var(--mono);
            font-size: 12px;
            padding: 8px 16px;
            border: 1px solid var(--fg-subtle);
            background: transparent;
            color: var(--fg-muted);
            transition: border-color 0.3s ease, color 0.3s ease, background 0.3s ease;
        }
        .consent-btn:hover { border-color: var(--fg-muted); color: var(--fg); }
        .consent-btn--accept { border-color: var(--fg); color: var(--fg); }
        .consent-btn--accept:hover { background: var(--fg); color: var(--bg); }

        @media (max-width: 480px) {
            .consent { right: 12px; bottom: 12px; left: 12px; max-width: none; }
        }
    </style>
</head>

<body>

    <canvas id="stage" tabindex="0" role="button"
        aria-label="The Eight logo with one dot missing. Press Enter to place the eighth dot."></canvas>

    <p class="stats" id="stats">est 2012.&ensp;bristol.</p>

    <noscript>
        <div class="noscript">
            <svg viewBox="0 0 100 100" aria-label="Eight" role="img" xmlns="http://www.w3.org/2000/svg">
                <circle cx="16" cy="16" r="10" fill="#EAEAEA"/><circle cx="50" cy="16" r="10" fill="#EAEAEA"/>
                <circle cx="84" cy="16" r="10" fill="#EAEAEA"/><circle cx="16" cy="50" r="10" fill="#EAEAEA"/>
                <circle cx="50" cy="50" r="10" fill="#EAEAEA"/><circle cx="84" cy="50" r="10" fill="#EAEAEA"/>
                <circle cx="16" cy="84" r="10" fill="#EAEAEA"/><circle cx="50" cy="84" r="10" fill="#EAEAEA"/>
            </svg>
            <p>we make software</p>
        </div>
    </noscript>

    <script>
    (function () {
        'use strict';

        const canvas = document.getElementById('stage');
        const ctx = canvas.getContext('2d');
        const statsEl = document.getElementById('stats');

        const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const coarse = window.matchMedia('(pointer: coarse)').matches;

        const FG = '#EAEAEA';
        const BG = '#08080A';
        const CYAN = 'rgba(0, 255, 255, 0.8)';
        const MAGENTA = 'rgba(255, 0, 255, 0.8)';
        const GREEN = '#3BFF71';
        const MONO = 'ui-monospace, "SF Mono", "Cascadia Mono", Menlo, Consolas, monospace';
        const DISPLAY = '"TASA Orbiter", "Avenir Next", "Segoe UI", sans-serif';
        const TAG_FG = '#B4B4BC';    // tagline sits between the dots (bright) and the stats line (dim)

        const MSG_MAIN = 'we make software';

        // ── The crash logs (green terminal, after the chaos peak) ──
        // A different one plays each time. All of them end with 'ok.'
        const LOGS = [
            [
                { txt: 'panic: unexpected dot at position 8', pre: 0 },
                { txt: '', pre: 120 },
                { txt: '$ git blame', pre: 380 },
                { txt: 'fatal: it was you', pre: 260 },
                { txt: '', pre: 120 },
                { txt: '$ make it stop', pre: 520 },
                { txt: "make: *** no rule to make target 'stop'.", pre: 180 },
                { txt: '', pre: 120 },
                { txt: '$ reboot', pre: 640 },
                { txt: 'ok.', pre: 320 }
            ],
            [
                { txt: 'segmentation fault (core dumped)', pre: 0 },
                { txt: '', pre: 120 },
                { txt: '$ reboot', pre: 420 },
                { txt: 'reboot: permission denied', pre: 220 },
                { txt: '', pre: 120 },
                { txt: '$ sudo reboot', pre: 520 },
                { txt: '[sudo] password for visitor:', pre: 200 },
                { txt: '········', pre: 380 },
                { txt: '', pre: 120 },
                { txt: 'ok.', pre: 420 }
            ],
            [
                { txt: 'error: dot 8 is not responding', pre: 0 },
                { txt: '', pre: 120 },
                { txt: 'force quit? [Y/n] y', pre: 520 },
                { txt: 'unsaved changes will be lost. continue? [Y/n] y', pre: 420 },
                { txt: 'really? [Y/n] Y', pre: 520 },
                { txt: '', pre: 120 },
                { txt: 'rebooting…', pre: 420 },
                { txt: 'ok.', pre: 320 }
            ],
            [
                { txt: 'kernel panic: dot overflow at position 8', pre: 0 },
                { txt: '', pre: 120 },
                { txt: '$ reboot', pre: 380 },
                { txt: 'sh: reboot: command not found', pre: 200 },
                { txt: '', pre: 120 },
                { txt: '$ ls', pre: 460 },
                { txt: 'reboot.sh', pre: 180 },
                { txt: '', pre: 120 },
                { txt: '$ ./reboot.sh', pre: 460 },
                { txt: 'ok.', pre: 320 }
            ]
        ];
        const CHAR_MS = 16;

        function buildSched(log) {
            let t = 350;
            const s = log.map(l => {
                t += l.pre;
                const start = t;
                t += l.txt.length * CHAR_MS;
                return { txt: l.txt, start: start };
            });
            s.total = t + 900;   // hold on the blinking cursor before reboot
            return s;
        }

        let sched = buildSched(LOGS[0]);
        let lastLogIdx = -1;

        // green fragments that bleed into the late peak
        const FRAGS = ['panic:', '0x0008', 'SIGSEGV', 'core dumped', 'at grid.js:8', '[FAILED]', 'oom: dot 8'];

        // ── Layout ──
        let W, H, DPR, S, R, CX, CY, TEXT_Y, FONT_PX, TAG_PX, SNAP;
        let slots = [];              // 9 grid positions; index 7 is the empty socket
        const SOCKET = 7;            // the eighth dot (bottom-middle). Nine stays empty — we're called Eight.

        function layout() {
            DPR = Math.min(window.devicePixelRatio || 1, 2);
            W = window.innerWidth;
            H = window.innerHeight;
            canvas.width = Math.round(W * DPR);
            canvas.height = Math.round(H * DPR);
            canvas.style.width = W + 'px';
            canvas.style.height = H + 'px';
            ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

            S = Math.round(Math.min(32, Math.max(22, Math.min(W, H) * 0.0425)));
            R = S * (10 / 34);       // real logo proportions (r10 / 34u spacing)
            SNAP = Math.max(S * 0.9, 30);
            CX = Math.round(W / 2);
            CY = Math.round(H / 2 - S * 0.35);
            TEXT_Y = Math.round(CY + S + R + Math.max(44, S * 1.4));
            FONT_PX = Math.max(12, Math.round(S * 0.42));
            TAG_PX = Math.max(15, Math.round(S * 0.56));

            slots = [];
            for (let i = 0; i < 9; i++) {
                const col = i % 3, row = Math.floor(i / 3);
                slots.push({ x: CX + (col - 1) * S, y: CY + (row - 1) * S });
            }
        }

        // ── State ──
        // phase: idle | snapping | show | eject
        const state = {
            phase: 'idle',
            phaseT0: 0,
            snapFrom: null,
            ejectTo: null,       // null → fade out in place
            armed: true,         // guards against instant re-trigger while the pointer still sits in the socket
            completions: 0
        };

        const pointer = { x: -200, y: -200, seen: false, overUI: false, down: false };
        const dot = { x: -200, y: -200, alpha: 0, targetAlpha: 0 };

        // ── Show timeline (ms after snap) ──
        const T_PULSE = 650;
        const T_STILL = 1500;
        const T_BUILD_END = 4200;                       // level ramps 0→10
        const T_PEAK_END = 8600;                        // grid detonates, everything goes
        const T_TERM = T_PEAK_END;                      // hard cut to the green terminal
        const ASSEMBLE_STAG = 85, ASSEMBLE_DUR = 680;
        const TYPE_MS = 48;
        const T_REDUCED_END = 3200;

        // tail of the timeline depends on which crash log is playing
        const tl = { assemble: 0, assemEnd: 0, typeStart: 0, typeEnd: 0, showEnd: 0 };

        function computeTail() {
            tl.assemble = T_TERM + sched.total;          // dots fly back in
            tl.assemEnd = tl.assemble + ASSEMBLE_DUR + 7 * ASSEMBLE_STAG;
            tl.typeStart = tl.assemEnd + 200;
            tl.typeEnd = tl.typeStart + MSG_MAIN.length * TYPE_MS;
            tl.showEnd = tl.typeEnd + 500;
        }
        computeTail();

        const SCATTER = [
            [-3.2, -3.9], [0.7, -4.6], [3.6, -2.9],
            [-4.3, 1.1], [0, 0], [4.6, 0.7],
            [-2.9, 4.3], [2.1, 3.6]
        ];

        // ── Helpers ──
        const rand = n => Math.random() * n;
        const clamp01 = t => Math.max(0, Math.min(1, t));
        const easeOutCubic = t => 1 - Math.pow(1 - t, 3);
        const easeInQuad = t => t * t;
        const easeInOutCubic = t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        const easeOutBack = t => { const c = 1.70158; return 1 + (c + 1) * Math.pow(t - 1, 3) + c * Math.pow(t - 1, 2); };
        const dist = (ax, ay, bx, by) => Math.hypot(ax - bx, ay - by);

        // Self-copy a slice of the canvas (source coords are device px).
        function slice(sx, sy, sw, sh, dx, dy) {
            sw = Math.max(1, sw); sh = Math.max(1, sh);
            sy = Math.max(0, Math.min(H - sh, sy));
            ctx.drawImage(canvas, sx * DPR, sy * DPR, sw * DPR, sh * DPR, dx, dy, sw, sh);
        }

        function setFont(px, weight) {
            ctx.font = (weight || 500) + ' ' + (px || FONT_PX) + 'px ' + MONO;
            try { ctx.letterSpacing = ((px || FONT_PX) * 0.08).toFixed(1) + 'px'; } catch (e) { /* older engines */ }
        }

        function setDisplayFont(px, weight) {
            ctx.font = (weight || 500) + ' ' + px + 'px ' + DISPLAY;
            try { ctx.letterSpacing = '0px'; } catch (e) { /* older engines */ }
        }

        function scrambleText(str) {
            const GLYPHS = '01<>/\\#*{}!?';
            const chars = str.split('');
            const n = 1 + Math.floor(rand(3));
            for (let i = 0; i < n; i++) {
                const p = Math.floor(rand(chars.length));
                if (chars[p] !== ' ') chars[p] = GLYPHS[Math.floor(rand(GLYPHS.length))];
            }
            return chars.join('');
        }

        function drawDot(x, y, radius, alpha) {
            ctx.globalAlpha = alpha;
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fillStyle = FG;
            ctx.fill();
            ctx.globalAlpha = 1;
        }

        function drawAberratedDot(x, y, radius, level) {
            const off = Math.min(14, level * 1.2);
            ctx.globalAlpha = 0.7;
            ctx.beginPath(); ctx.arc(x - off, y, radius, 0, Math.PI * 2); ctx.fillStyle = CYAN; ctx.fill();
            ctx.beginPath(); ctx.arc(x + off, y, radius, 0, Math.PI * 2); ctx.fillStyle = MAGENTA; ctx.fill();
            ctx.globalAlpha = 1;
        }

        // ── Ghost socket (the dotted outline waiting for dot #8) ──
        let dashOffset = 0;

        function drawSocket(now, proximity) {
            const slot = slots[SOCKET];
            let alpha = 0.5 + proximity * 0.4;
            let radius = R;

            if (coarse && !reduced) {
                // gentle invitation pulse on touch devices
                const p = 0.5 + 0.5 * Math.sin(now / 1200 * Math.PI * 2);
                alpha = 0.42 + 0.2 * p;
                radius = R * (1 + 0.05 * p);
            }

            ctx.save();
            ctx.strokeStyle = 'rgba(234, 234, 234, ' + alpha.toFixed(3) + ')';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([4, 6]);
            ctx.lineDashOffset = dashOffset;
            ctx.beginPath();
            ctx.arc(slot.x, slot.y, radius, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
        }

        // ── Tagline ──
        function drawText(text, level, opts) {
            opts = opts || {};
            setDisplayFont(TAG_PX, 500);
            ctx.textBaseline = 'middle';

            let display = (level > 6 && Math.random() < 0.3) ? scrambleText(text) : text;

            const fullW = ctx.measureText(opts.anchor || display).width;
            const x0 = CX - fullW / 2;
            ctx.textAlign = 'left';

            if (level > 0 && Math.random() < 0.12 * level) {
                const i = level * 1.6;
                ctx.fillStyle = CYAN;
                ctx.fillText(display, x0 + (Math.random() - 0.5) * i, TEXT_Y + (Math.random() - 0.5) * i);
                ctx.fillStyle = MAGENTA;
                ctx.fillText(display, x0 + (Math.random() - 0.5) * i, TEXT_Y + (Math.random() - 0.5) * i);
            }

            ctx.fillStyle = TAG_FG;
            ctx.fillText(display, x0, TEXT_Y);

            if (opts.caret) {
                const w = ctx.measureText(display).width;
                const on = opts.caretBlink ? (Math.floor(performance.now() / 500) % 2 === 0) : true;
                if (on) ctx.fillRect(x0 + w + TAG_PX * 0.15, TEXT_Y - TAG_PX * 0.55, TAG_PX * 0.5, TAG_PX * 1.1);
            }
        }

        // ── Build-phase glitches ──
        function fxScanline(level) {
            if (Math.random() < 0.06 * level) {
                const y = rand(H), h = 1 + rand(10);
                slice(0, y, W, h, (Math.random() - 0.5) * 12 * level, y);
            }
        }

        function fxVJump(level) {
            if (Math.random() < 0.02 * level) {
                slice(0, 0, W, H, 0, (Math.random() - 0.5) * level * 2);
            }
        }

        function fxNoise(level, chance) {
            // monochrome interference patches — no random RGB confetti
            if (level > 5 && Math.random() < chance) {
                const n = 3 + Math.floor(rand(8));
                for (let i = 0; i < n; i++) {
                    const g = 30 + Math.floor(rand(80));
                    ctx.fillStyle = 'rgba(' + g + ',' + g + ',' + (g + 6) + ',0.8)';
                    ctx.fillRect(rand(W), rand(H), 14 + rand(60), 6 + rand(34));
                }
            }
        }

        // ── Dot rain — the sky rains dots, not Matrix glyphs ──
        let rain = [];

        function updateRain(spawnRate, dtMs) {
            for (let i = 0; i < spawnRate; i++) {
                if (rain.length < 120 && Math.random() < 0.8) {
                    rain.push({
                        x: rand(W), y: -10,
                        v: 260 + rand(520),
                        r: 1.5 + rand(3),
                        a: 0.25 + rand(0.55)
                    });
                }
            }
            rain = rain.filter(p => (p.y += p.v * dtMs / 1000) < H + 12);
            rain.forEach(p => drawDot(p.x, p.y, p.r, p.a));
        }

        // ── Chaos peak: the grid detonates ──
        const chaos = { on: false, dots: [], rollV: 0 };

        function initChaos() {
            chaos.on = true;
            chaos.rollV = 0;
            chaos.dots = [];
            for (let i = 0; i < 8; i++) {
                const sl = slots[i];
                const ang = Math.atan2(sl.y - CY, sl.x - CX) + (Math.random() - 0.5) * 0.8;
                const sp = 200 + rand(480);
                chaos.dots.push({ x: sl.x, y: sl.y, vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp, r: R, main: true });
            }
            for (let i = 0; i < 36; i++) {
                const ang = rand(Math.PI * 2), sp = 260 + rand(700);
                chaos.dots.push({ x: CX, y: CY, vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp, r: 1.5 + rand(5), main: false });
            }
        }

        function renderPeak(t, dtMs) {
            const p = clamp01((t - T_BUILD_END) / (T_PEAK_END - T_BUILD_END));
            const dt = dtMs / 1000;
            const level = 10 + p * 6;

            if (!chaos.on) initChaos();

            // trail
            ctx.fillStyle = 'rgba(8, 8, 10, 0.22)';
            ctx.fillRect(0, 0, W, H);

            ctx.save();
            const shake = 4 + p * 12;
            ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);

            // detonation shockwave (first 500ms of peak)
            if (t - T_BUILD_END < 500) {
                const q = (t - T_BUILD_END) / 500;
                ctx.globalAlpha = (1 - q) * 0.7;
                ctx.strokeStyle = FG;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(CX, CY, easeOutCubic(q) * Math.max(W, H) * 0.5, 0, Math.PI * 2);
                ctx.stroke();
                ctx.globalAlpha = 1;
            }

            // loose dots with physics
            chaos.dots.forEach(d => {
                d.x += d.vx * dt; d.y += d.vy * dt;
                if ((d.x < d.r && d.vx < 0) || (d.x > W - d.r && d.vx > 0)) d.vx *= -0.92;
                if ((d.y < d.r && d.vy < 0) || (d.y > H - d.r && d.vy > 0)) d.vy *= -0.92;
                if (Math.random() < 0.06) { d.vx += (Math.random() - 0.5) * 600; d.vy += (Math.random() - 0.5) * 600; }
                const rr = d.r * (0.7 + Math.random() * 0.8);
                if (d.main && Math.random() < 0.5) drawAberratedDot(d.x, d.y, rr, level);
                drawDot(d.x, d.y, rr, d.main ? 1 : 0.4 + Math.random() * 0.5);
            });

            // tagline, badly
            drawText(MSG_MAIN, level);

            // tagline echoes stamped everywhere
            if (Math.random() < 0.3 + p * 0.55) {
                const n = 1 + Math.floor(rand(4));
                for (let i = 0; i < n; i++) {
                    setDisplayFont(TAG_PX * (1 + rand(3)), 600);
                    const cols = [FG, CYAN, MAGENTA];
                    ctx.fillStyle = cols[Math.floor(rand(3))];
                    ctx.globalAlpha = 0.2 + rand(0.5);
                    ctx.fillText(scrambleText(MSG_MAIN), rand(W * 0.8), rand(H));
                }
                ctx.globalAlpha = 1;
            }

            // the terminal starts leaking through near the end
            if (p > 0.7 && Math.random() < 0.35) {
                setFont(Math.max(12, FONT_PX), 500);
                ctx.fillStyle = GREEN;
                ctx.globalAlpha = 0.3 + rand(0.45);
                ctx.fillText(FRAGS[Math.floor(rand(FRAGS.length))], rand(W * 0.85), rand(H));
                ctx.globalAlpha = 1;
            }

            ctx.restore();

            // feedback warp: the frame eats itself
            if (Math.random() < 0.3) {
                ctx.save();
                ctx.translate(CX, CY);
                ctx.rotate((Math.random() - 0.5) * 0.06 * p);
                const sc = 1 + (Math.random() - 0.5) * 0.06 * p;
                ctx.scale(sc, sc);
                ctx.translate(-CX, -CY);
                ctx.globalAlpha = 0.8;
                ctx.drawImage(canvas, 0, 0, canvas.width, canvas.height, 0, 0, W, H);
                ctx.restore();
                ctx.globalAlpha = 1;
            }

            // slice storm
            if (p > 0.1 && Math.random() < 0.85) {
                const bands = 6 + Math.floor(p * 18);
                const bh = H / bands;
                for (let i = 0; i < bands; i++) {
                    if (Math.random() < 0.7) slice(0, i * bh, W, bh, (Math.random() - 0.5) * (10 + p * 80), i * bh);
                }
            }

            // vertical roll (V-hold failure)
            if (Math.random() < 0.08 * p) chaos.rollV = (Math.random() - 0.5) * 1400;
            chaos.rollV *= 0.94;
            if (Math.abs(chaos.rollV) > 40) {
                slice(0, 0, W, H, 0, chaos.rollV * dt * 8);
            }

            // band inversion flickers (partial-screen, kept brief)
            if (Math.random() < 0.15 * p) {
                ctx.save();
                ctx.globalCompositeOperation = 'difference';
                ctx.fillStyle = '#fff';
                ctx.fillRect(0, rand(H), W, 6 + rand(50));
                ctx.restore();
            }

            fxNoise(level, 0.5);
            updateRain(2 + Math.floor(p * 3), dtMs);
        }

        // ── Green terminal (the crash log) ──
        function renderTerminal(tt, staticFull) {
            ctx.fillStyle = '#040604';
            ctx.fillRect(0, 0, W, H);

            const f = Math.max(13, FONT_PX);
            setFont(f, 500);
            try { ctx.letterSpacing = '0px'; } catch (e) {}
            const lh = Math.round(f * 1.75);

            let maxW = 0;
            for (const L of sched) maxW = Math.max(maxW, ctx.measureText(L.txt).width);
            const x0 = Math.max(24, CX - maxW / 2);
            const y0 = Math.max(56, CY - (sched.length * lh) / 2);

            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = GREEN;
            ctx.shadowBlur = 8;
            ctx.fillStyle = GREEN;

            let cursorX = x0, cursorY = y0, typing = false;
            sched.forEach((L, i) => {
                if (!staticFull && tt < L.start) return;
                const n = staticFull ? L.txt.length
                    : Math.min(L.txt.length, Math.floor((tt - L.start) / CHAR_MS));
                const part = L.txt.slice(0, Math.max(0, n));
                ctx.globalAlpha = L.txt.charAt(0) === '$' ? 1 : 0.88;
                const y = y0 + i * lh;
                if (part) ctx.fillText(part, x0, y);
                cursorX = x0 + ctx.measureText(part).width;
                cursorY = y;
                if (!staticFull && n < L.txt.length) typing = true;
            });
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1;

            // green block cursor: solid while typing, blinking while thinking
            const on = staticFull || typing || (Math.floor(tt / 400) % 2 === 0);
            if (on) {
                ctx.fillStyle = GREEN;
                ctx.fillRect(cursorX + f * 0.2, cursorY - f * 0.55, f * 0.55, f * 1.1);
            }

            // CRT dressing: scanlines + vignette + the odd jitter
            ctx.fillStyle = 'rgba(0, 0, 0, 0.18)';
            for (let y = 0; y < H; y += 3) ctx.fillRect(0, y, W, 1);

            const vg = ctx.createRadialGradient(CX, CY, Math.min(W, H) * 0.3, CX, CY, Math.max(W, H) * 0.75);
            vg.addColorStop(0, 'rgba(0,0,0,0)');
            vg.addColorStop(1, 'rgba(0,0,0,0.55)');
            ctx.fillStyle = vg;
            ctx.fillRect(0, 0, W, H);

            if (!staticFull && Math.random() < 0.06) {
                const y = rand(H);
                slice(0, y, W, 2 + rand(6), (Math.random() - 0.5) * 8, y);
            }
        }

        // ── Phase transitions ──
        function beginSnap(fromX, fromY) {
            state.phase = 'snapping';
            state.phaseT0 = performance.now();
            state.snapFrom = { x: fromX, y: fromY };
            canvas.setAttribute('aria-label', 'Eighth dot placed. Enjoy the show.');
        }

        function beginShow() {
            state.phase = 'show';
            state.phaseT0 = performance.now();
            state.completions++;
            rain = [];
            chaos.on = false;

            // a different crash log each time, never the same one twice running
            let idx = Math.floor(rand(LOGS.length));
            if (idx === lastLogIdx) idx = (idx + 1) % LOGS.length;
            lastLogIdx = idx;
            sched = buildSched(LOGS[idx]);
            computeTail();

            if (window.gtag) window.gtag('event', 'eighth_dot_placed', { crash_log: idx });
        }

        function beginEject() {
            state.phase = 'eject';
            state.phaseT0 = performance.now();
            state.ejectTo = (!coarse && pointer.seen && !pointer.overUI)
                ? { x: pointer.x, y: pointer.y }
                : null;
            canvas.setAttribute('aria-label',
                'The Eight logo with one dot missing. Press Enter to place the eighth dot.');
        }

        function backToIdle() {
            state.phase = 'idle';
            state.phaseT0 = performance.now();
            state.armed = false;
            dot.alpha = (!coarse && pointer.seen) ? 1 : 0;
            dot.x = pointer.x; dot.y = pointer.y;
        }

        // ── Render: idle ──
        function renderIdle(now, dtMs) {
            ctx.fillStyle = BG;
            ctx.fillRect(0, 0, W, H);

            const slot = slots[SOCKET];

            // cursor dot follows the pointer
            if (!coarse && pointer.seen && !pointer.overUI) {
                const k = reduced ? 1 : Math.min(1, dtMs * 0.018);
                dot.x += (pointer.x - dot.x) * k;
                dot.y += (pointer.y - dot.y) * k;
                dot.targetAlpha = 1;
            } else if (!pointer.down) {
                dot.targetAlpha = 0;
            }
            dot.alpha += (dot.targetAlpha - dot.alpha) * Math.min(1, dtMs * 0.012);

            const dNear = dist(dot.x, dot.y, slot.x, slot.y);
            const proximity = dot.alpha > 0.5 ? clamp01(1 - dNear / (S * 3)) : 0;

            dashOffset -= (1 + proximity * 3) * dtMs * 0.012;

            // residents
            for (let i = 0; i < 7; i++) {
                const lean = residentLean(i);
                drawDot(slots[i].x + lean[0], slots[i].y + lean[1], R, residentAlpha(i, now));
            }

            drawSocket(now, proximity);
            drawText(MSG_MAIN, 0);

            if (dot.alpha > 0.01) drawDot(dot.x, dot.y, R, dot.alpha);

            // completion: the dot reaches the socket
            if (!state.armed && (dNear > Math.max(S * 1.5, 50) || dot.alpha < 0.3)) state.armed = true;
            if (state.armed && dot.alpha > 0.5 && dNear < SNAP) {
                beginSnap(dot.x, dot.y);
            }
        }

        function residentAlpha(i, now) {
            if (reduced) return 1;
            return 1 - 0.4 * (0.5 + 0.5 * Math.sin(now / 6000 * Math.PI * 2 + i * 0.9));
        }

        function residentLean(i) {
            if (reduced || !pointer.seen) return [0, 0];
            const s = slots[i];
            const d = dist(pointer.x, pointer.y, s.x, s.y);
            if (d > 200 || d < 1) return [0, 0];
            const k = 2.5 * (1 - d / 200);
            return [(pointer.x - s.x) / d * k, (pointer.y - s.y) / d * k];
        }

        // ── Render: snapping (320ms magnetic click into place) ──
        function renderSnap(now) {
            const slot = slots[SOCKET];
            const t = clamp01((now - state.phaseT0) / (reduced ? 1 : 320));
            const e = easeOutBack(t);

            ctx.fillStyle = BG;
            ctx.fillRect(0, 0, W, H);

            for (let i = 0; i < 7; i++) drawDot(slots[i].x, slots[i].y, R, residentAlpha(i, now));
            drawSocket(now, 1);
            drawText(MSG_MAIN, 0);

            const x = state.snapFrom.x + (slot.x - state.snapFrom.x) * e;
            const y = state.snapFrom.y + (slot.y - state.snapFrom.y) * e;
            drawDot(x, y, R, 1);

            if (t >= 1) beginShow();
        }

        // ── Render: the show ──
        function renderShow(now, dtMs) {
            const t = now - state.phaseT0;

            if (reduced) { renderShowReduced(t); return; }

            statsEl.classList.toggle('visible', t < T_STILL || t > tl.assemEnd);

            // ---- Act V: the crash log ----
            if (t >= T_TERM && t < tl.assemble) {
                renderTerminal(t - T_TERM, false);
                return;
            }

            // ---- Act VI: reboot — reassembly, then the tagline again ----
            if (t >= tl.assemble) {
                ctx.fillStyle = BG;
                ctx.fillRect(0, 0, W, H);

                for (let i = 0; i < 8; i++) {
                    const st = tl.assemble + i * ASSEMBLE_STAG;
                    const p = clamp01((t - st) / ASSEMBLE_DUR);
                    if (p <= 0) continue;
                    const e = easeOutCubic(p);
                    const x = slots[i].x + SCATTER[i][0] * S * (1 - e);
                    const y = slots[i].y + SCATTER[i][1] * S * (1 - e);
                    drawDot(x, y, R * (0.35 + 0.65 * e), p);
                }

                if (t > tl.typeStart) {
                    const n = Math.floor((t - tl.typeStart) / TYPE_MS);
                    const done = n >= MSG_MAIN.length;
                    drawText(MSG_MAIN.slice(0, Math.min(MSG_MAIN.length, n)), 0,
                        { caret: !done, anchor: MSG_MAIN });
                }

                if (t >= tl.showEnd) beginEject();
                return;
            }

            // ---- Act IV: peak — total detonation ----
            if (t >= T_BUILD_END) {
                renderPeak(t, dtMs);
                return;
            }

            // ---- Acts I–III: pulse → stillness → build-up ----
            let level = 0, shake = 0;
            if (t >= T_STILL) {
                const p = easeInQuad((t - T_STILL) / (T_BUILD_END - T_STILL));
                level = 10 * p;
                shake = 4 * p;
            }

            ctx.fillStyle = BG;
            ctx.fillRect(0, 0, W, H);

            ctx.save();
            if (shake > 0.2) ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);

            for (let i = 0; i < 8; i++) {
                let x = slots[i].x, y = slots[i].y, a = 1, radius = R;

                if (t < T_PULSE) {
                    // completion pulse ripples out from the socket
                    const d = dist(slots[i].x, slots[i].y, slots[SOCKET].x, slots[SOCKET].y);
                    const delay = d / (3 * S) * 260;
                    const p = clamp01((t - delay) / 420);
                    radius = R * (1 + 0.18 * Math.sin(p * Math.PI));
                } else if (t < T_STILL) {
                    // uneasy stillness: one dot flickers
                    if (i === 2 && ((t > 1150 && t < 1230) || (t > 1330 && t < 1400))) a = 0.15;
                } else {
                    if (Math.random() < 0.1 * level) {
                        x += (Math.random() - 0.5) * Math.min(16, level * 4);
                        y += (Math.random() - 0.5) * Math.min(16, level * 4);
                    }
                    if (Math.random() < 0.05 * level) drawAberratedDot(x, y, radius, level);
                }
                drawDot(x, y, radius, a);
            }

            // pulse ripple ring
            if (t < T_PULSE) {
                const p = t / T_PULSE;
                ctx.globalAlpha = (1 - p) * 0.5;
                ctx.strokeStyle = FG;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(slots[SOCKET].x, slots[SOCKET].y, R + easeOutCubic(p) * S * 2.2, 0, Math.PI * 2);
                ctx.stroke();
                ctx.globalAlpha = 1;
            }

            drawText(MSG_MAIN, level);
            ctx.restore();

            if (level > 0) {
                fxScanline(level);
                fxVJump(level);
                fxNoise(level, 0.12);
                updateRain(level > 6 ? 1 : 0, dtMs);
            }
        }

        // ── Render: reduced-motion show (no flashing, no shake — just the log) ──
        function renderShowReduced(t) {
            if (t >= 400 && t < 2700) {
                renderTerminal(0, true);
            } else {
                ctx.fillStyle = BG;
                ctx.fillRect(0, 0, W, H);
                for (let i = 0; i < 8; i++) drawDot(slots[i].x, slots[i].y, R, 1);
                drawText(MSG_MAIN, 0);
            }
            if (t >= T_REDUCED_END) beginEject();
        }

        // ── Render: eject (dot #8 returns to the visitor) ──
        function renderEject(now) {
            const t = clamp01((now - state.phaseT0) / (reduced ? 1 : 480));
            const slot = slots[SOCKET];

            ctx.fillStyle = BG;
            ctx.fillRect(0, 0, W, H);

            for (let i = 0; i < 7; i++) drawDot(slots[i].x, slots[i].y, R, residentAlpha(i, now));
            ctx.globalAlpha = t;
            drawSocket(now, 0);
            ctx.globalAlpha = 1;
            drawText(MSG_MAIN, 0);

            if (state.ejectTo) {
                const e = easeInOutCubic(t);
                drawDot(slot.x + (state.ejectTo.x - slot.x) * e,
                        slot.y + (state.ejectTo.y - slot.y) * e, R, 1);
            } else {
                drawDot(slot.x, slot.y, R, 1 - t);
            }

            if (t >= 1) backToIdle();
        }

        // ── Main loop ──
        let last = performance.now();

        function tick(now) {
            const dtMs = Math.min(50, now - last);
            last = now;

            if (state.phase === 'idle') renderIdle(now, dtMs);
            else if (state.phase === 'snapping') renderSnap(now);
            else if (state.phase === 'show') renderShow(now, dtMs);
            else if (state.phase === 'eject') renderEject(now);

            requestAnimationFrame(tick);
        }

        // ── Input ──
        window.addEventListener('pointermove', (e) => {
            pointer.x = e.clientX;
            pointer.y = e.clientY;
            pointer.seen = true;
            if (coarse && pointer.down && state.phase === 'idle') {
                dot.x = e.clientX; dot.y = e.clientY;
                dot.alpha = 1; dot.targetAlpha = 1;
            }
        }, { passive: true });

        canvas.addEventListener('pointerdown', (e) => {
            if (state.phase !== 'idle') return;
            pointer.down = true;
            pointer.x = e.clientX; pointer.y = e.clientY; pointer.seen = true;
            if (coarse) {
                const slot = slots[SOCKET];
                if (dist(e.clientX, e.clientY, slot.x, slot.y) < SNAP) {
                    beginSnap(e.clientX, e.clientY);
                } else {
                    dot.x = e.clientX; dot.y = e.clientY;
                    dot.alpha = 1; dot.targetAlpha = 1;
                }
            }
        });

        window.addEventListener('pointerup', () => {
            pointer.down = false;
            if (coarse && state.phase === 'idle' && dot.alpha > 0.5) {
                const slot = slots[SOCKET];
                if (dist(dot.x, dot.y, slot.x, slot.y) < SNAP) {
                    beginSnap(dot.x, dot.y);
                } else {
                    dot.targetAlpha = 0;
                }
            }
        });

        document.addEventListener('mouseleave', () => { pointer.seen = false; });

        canvas.addEventListener('keydown', (e) => {
            if ((e.key === 'Enter' || e.key === ' ') && state.phase === 'idle') {
                e.preventDefault();
                const slot = slots[SOCKET];
                beginSnap(slot.x + S * 4, slot.y + S * 2.5);
            }
        });

        // the custom cursor yields to real UI (consent banner)
        document.addEventListener('pointerover', (e) => {
            pointer.overUI = !!(e.target.closest && e.target.closest('.consent'));
        });

        window.addEventListener('resize', layout);

        // ── Start ──
        layout();
        if (document.fonts && document.fonts.load) {
            document.fonts.load('500 ' + TAG_PX + 'px "TASA Orbiter"');
            document.fonts.load('600 ' + TAG_PX + 'px "TASA Orbiter"');
        }
        requestAnimationFrame(tick);
        setTimeout(() => statsEl.classList.add('visible'), 1600);
    })();
    </script>

    <!-- Cookie Consent -->
    <div class="consent" id="consent" role="dialog" aria-label="Cookie consent" aria-describedby="consentDesc">
        <div class="consent-inner">
            <p class="consent-text" id="consentDesc">
                <strong>Want to be tracked by Google?</strong> That's all we use — Google Analytics. Nothing else.
            </p>
            <div class="consent-actions">
                <button class="consent-btn" id="consentDecline">Rather not</button>
                <button class="consent-btn consent-btn--accept" id="consentAccept">Sure, go ahead</button>
            </div>
        </div>
    </div>

    <script>
        // ── Cookie Consent & Conditional GA ──
        (function() {
            var GA_ID = 'G-QGQHJ9SM6G';
            var CONSENT_KEY = 'eight-analytics';
            var consent = localStorage.getItem(CONSENT_KEY);

            function loadGA() {
                if (document.querySelector('script[src*="googletagmanager"]')) return;
                var s = document.createElement('script');
                s.async = true;
                s.src = 'https://www.googletagmanager.com/gtag/js?id=' + GA_ID;
                document.head.appendChild(s);
                window.dataLayer = window.dataLayer || [];
                function gtag(){dataLayer.push(arguments);}
                window.gtag = gtag;
                gtag('js', new Date());
                gtag('config', GA_ID);
            }

            function dismissBanner() {
                var el = document.getElementById('consent');
                el.classList.add('hiding');
                el.addEventListener('transitionend', function() {
                    el.remove();
                }, { once: true });
            }

            if (consent === 'yes') {
                loadGA();
                var el = document.getElementById('consent');
                if (el) el.remove();
                return;
            }
            if (consent === 'no') {
                var el = document.getElementById('consent');
                if (el) el.remove();
                return;
            }

            setTimeout(function() {
                var el = document.getElementById('consent');
                if (el) el.classList.add('visible');
            }, 1500);

            document.getElementById('consentAccept').addEventListener('click', function() {
                localStorage.setItem(CONSENT_KEY, 'yes');
                loadGA();
                dismissBanner();
            });

            document.getElementById('consentDecline').addEventListener('click', function() {
                localStorage.setItem(CONSENT_KEY, 'no');
                dismissBanner();
            });
        })();
    </script>
