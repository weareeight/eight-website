<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eight — Digital Products</title>
    <meta name="description" content="Eight builds digital products — SaaS tools and Shopify themes crafted with precision.">

    <!-- Google Fonts: TASA Orbiter (variable, 400-800) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=TASA+Orbiter:wght@400..800&display=swap" rel="stylesheet">

    <style>
        /* ── CSS Reset ── */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ── Custom Properties ── */
        :root {
            /* Base palette */
            --bg: #08080A;
            --fg: #EAEAEA;
            --fg-muted: #787878;
            --fg-subtle: #3a3a3a;

            /* Product accent colours */
            --accent-signal: #E8A849;
            --accent-forge: #5B8DEF;
            --accent-meridian: #6BAF8D;
            --accent-vault: #7B6FD4;
            --accent-prism: #D4708F;
            --accent-relay: #4DBDB9;
            --accent-atlas: #B8A99A;
            --accent-orbit: #9B8EC4;

            /* Font stacks */
            --font-display: 'TASA Orbiter', sans-serif;
            --font-body: 'TASA Orbiter', sans-serif;

            /* Easing curves */
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
        }

        /* ── HTML ── */
        html {
            scroll-behavior: smooth;
        }

        /* ── Body ── */
        body {
            font-family: var(--font-body);
            background-color: var(--bg);
            color: var(--fg);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--fg-subtle); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--fg-muted); }

        /* ── Selection ── */
        ::selection {
            background: var(--fg);
            color: var(--bg);
        }

        /* ── Link Reset ── */
        a {
            color: inherit;
            text-decoration: none;
        }

        /* ── Container ── */
        .container {
            max-width: 1320px;
            margin: 0 auto;
            padding: 0 40px;
        }

        @media (max-width: 768px) {
            .container { padding: 0 20px; }
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav id="nav"></nav>

    <!-- Main Content -->
    <main>
        <section class="hero" id="hero"></section>
        <section class="products" id="products"></section>
    </main>

    <!-- Footer -->
    <footer id="footer"></footer>

    <script>
        // Application logic will be added in subsequent tasks
    </script>

</body>
</html>
